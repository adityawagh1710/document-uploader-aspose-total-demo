# compose.go.yaml — override that runs the GO orchestrator backend instead of
# the Python one.
#
# The Go image honours the same OFFICE_CONVERT_* env and the same /v1 contract,
# so EVERYTHING else is inherited unchanged from compose.yaml: ports, the
# license + cache mounts, env (CHUNK_TIMEOUT=1800, MAX_INPUT_BYTES=1 GiB,
# PARALLEL=4, POOL_MIN_CHUNKS=1, …), mem_limit/memswap, tmpfs, the Streamlit UI
# (test-ui, which reaches the `office-convert` service by name either way), and
# localstack. Only the backend image build changes.
#
# Usage (compose merges -f files left→right):
#   docker compose -f compose.yaml -f compose.go.yaml up -d --build
#   docker compose -f compose.yaml -f compose.go.yaml down
#   docker compose -f compose.yaml -f compose.go.yaml logs -f office-convert
#
# Or export once and drop the flags:
#   export COMPOSE_FILE=compose.yaml:compose.go.yaml
#   docker compose up -d --build   # now drives the Go stack
#   docker compose down

services:
  office-convert:
    build:
      # context (.) is inherited from compose.yaml; only the Dockerfile swaps.
      dockerfile: go.Dockerfile
    image: office-convert:go
