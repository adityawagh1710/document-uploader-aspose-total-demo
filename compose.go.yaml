# compose.go.yaml — override that runs the GO orchestrator backend instead of
# the Python one.
#
# The Go image honours the same OFFICE_CONVERT_* env and the same /v1 contract,
# so EVERYTHING else is inherited unchanged from compose.yaml: ports, the
# license + cache mounts, env (CHUNK_TIMEOUT=1800, MAX_INPUT_BYTES=1 GiB,
# PARALLEL=4, POOL_MIN_CHUNKS=1, …), mem_limit/memswap, tmpfs, the Streamlit UI
# (test-ui, which reaches the `office-convert` service by name either way), and
# localstack. Only the backend image build changes.
#
# Usage (compose merges -f files left→right):
#   docker compose -f compose.yaml -f compose.go.yaml up -d --build
#   docker compose -f compose.yaml -f compose.go.yaml down
#   docker compose -f compose.yaml -f compose.go.yaml logs -f office-convert
#
# Or export once and drop the flags:
#   export COMPOSE_FILE=compose.yaml:compose.go.yaml
#   docker compose up -d --build   # now drives the Go stack
#   docker compose down

services:
  office-convert:
    build:
      # context (.) is inherited from compose.yaml; only the Dockerfile swaps.
      dockerfile: go.Dockerfile
    image: office-convert:go
    # Override the base healthcheck: compose.yaml's probe shells out to `python`,
    # but the Go runtime image is Python-free. The binary probes its own /health
    # instead (same intent, same 10s/5s/30s/3 timings). Without this the Go
    # backend would never report healthy and dependents (the UI) would not start.
    healthcheck:
      test: ["CMD", "/usr/local/bin/office-convert-orchestrator", "healthcheck"]
    environment:
      # HTML dual-engine feature (Go backend only): where the Chromium engine
      # lives. The Aspose engine needs no config (it rides worker-docx).
      OFFICE_CONVERT_GOTENBERG_URL: "http://gotenberg:3000"
    depends_on:
      gotenberg:
        condition: service_started

  # Next.js operator dashboard — replaces the Streamlit test-ui for the Go
  # stack. Same host port (8501) so operator bookmarks keep working; the
  # container listens on 3000. API_URL is the server-side rewrite target
  # (single-origin proxy); NEXT_PUBLIC_DASHBOARD_URL is the only
  # browser-facing API URL (the /v1/dashboard iframe).
  # !override (not merge) on ports/volumes/environment: the base Streamlit
  # service publishes 8501:8501 and mounts docker.sock — a plain merge would
  # union those with ours (host-port clash; unwanted socket mount).
  test-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: office-convert-ui:dev
    ports: !override
      - "127.0.0.1:8501:3000"
    volumes: !override []   # Next UI reads /v1/stats over HTTP; no docker.sock
    environment: !override
      API_URL: "http://office-convert:8080"
      NEXT_PUBLIC_DASHBOARD_URL: "http://localhost:8080/v1/dashboard"
      NEXT_PUBLIC_S3_ENABLED: "${OFFICE_CONVERT_S3_ENABLED:-true}"
      PORT: "3000"
    depends_on:
      - office-convert

  # Gotenberg (Chromium) — the JS-capable HTML→PDF engine behind
  # POST /v1/convert/html/gotenberg. Separate container by necessity: Chromium
  # (~300 MB) cannot live in the single-binary Go image. Internal-only (no host
  # port); the API reaches it as http://gotenberg:3000 on the compose network.
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: office-convert-gotenberg
    restart: unless-stopped
    # BR-4 deny policy, Chromium enforcement point. The regex is the
    # ChromiumDenyListRegex constant from internal/netpolicy/netpolicy.go —
    # keep the two literally in sync (the netpolicy PBT suite pins the Go
    # matcher to this same pattern). Blocks loopback, RFC1918, link-local/
    # metadata, IPv6-private, and single-label (in-cluster) hosts.
    command:
      - "gotenberg"
      - "--chromium-deny-list=^https?://(?:[^@/]*@)?(?:localhost|[^/:.]+|[^/:]*\\.localhost|127\\.[0-9.]+|0\\.0\\.0\\.0|10\\.[0-9.]+|192\\.168\\.[0-9.]+|172\\.(?:1[6-9]|2[0-9]|3[01])\\.[0-9.]+|169\\.254\\.[0-9.]+|\\[::1\\]|\\[[fF][cdCD][0-9a-fA-F]{2}:[^\\]]*\\]|\\[[fF][eE][89abAB][0-9a-fA-F]:[^\\]]*\\])(?::[0-9]+)?(?:[/?#]|$)"
      # Above the orchestrator's 120s client timeout so the client, not
      # Gotenberg, decides when a conversion is dead (clean error mapping).
      - "--api-timeout=130s"
      - "--chromium-max-queue-size=10"
    mem_limit: 768m
    security_opt:
      - no-new-privileges:true
