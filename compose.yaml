# compose.yaml — Docker Compose configuration for office-convert.
#
# Brings up the Go orchestrator + Next.js UI + Gotenberg + LocalStack.
#
# Quick start:
#   1. Place your Aspose license next to this file:
#        Aspose.TotalforC++.lic
#   2. Populate vendor/aspose/ (see README.md "SDK acquisition")
#   3. docker compose up -d --build
#   4. curl http://localhost:8080/health
#      open http://localhost:8501

# Pin the project name so it doesn't change if this directory is renamed.
name: office-convert

services:

  # ============================================================
  # Production service — Go orchestrator HTTP server.
  # ============================================================
  office-convert:
    container_name: office-convert
    build:
      context: .
      dockerfile: Dockerfile
    image: office-convert:go
    ports:
      # localhost-only by default. Change to "8080:8080" to expose on all
      # interfaces (NOT recommended — there's no application-layer auth).
      - "127.0.0.1:8080:8080"
    volumes:
      # The Aspose license is bind-mounted from the host, read-only.
      - ./Aspose.TotalforC++.lic:/aspose/license.lic:ro
      # Persistent cache directory. Survives container recreates.
      - office-convert-cache:/cache
    environment:
      OFFICE_CONVERT_MAX_JOBS: "2"
      OFFICE_CONVERT_PARALLEL: "4"
      OFFICE_CONVERT_LOG_FORMAT: "human"
      OFFICE_CONVERT_LOG_LEVEL: "info"
      OFFICE_CONVERT_CHUNK_TIMEOUT_SECONDS: "1800"
      OFFICE_CONVERT_MAX_INPUT_BYTES: "1073741824"
      OFFICE_CONVERT_MAX_PAGES_PER_CHUNK: "${OFFICE_CONVERT_MAX_PAGES_PER_CHUNK:-10000}"
      OFFICE_CONVERT_HEARTBEAT_MS: "${OFFICE_CONVERT_HEARTBEAT_MS:-2000}"
      OFFICE_CONVERT_POOL_MIN_CHUNKS: "${OFFICE_CONVERT_POOL_MIN_CHUNKS:-1}"
      OFFICE_CONVERT_FORK_AFTER_LOAD: "${OFFICE_CONVERT_FORK_AFTER_LOAD:-1}"
      OFFICE_CONVERT_XLSX_MAX_POOL_SIZE: "${OFFICE_CONVERT_XLSX_MAX_POOL_SIZE:-4}"
      OFFICE_CONVERT_WORKER_RAM_BYTES: "6442450944"
      OFFICE_CONVERT_CACHE_DIR: "/cache"
      HOME: "/tmp"
      # ---- S3 source/sink integration (LocalStack-backed for local dev) ----
      OFFICE_CONVERT_S3_ENABLED: "${OFFICE_CONVERT_S3_ENABLED:-true}"
      OFFICE_CONVERT_S3_INPUT_BUCKETS_ALLOWLIST: "office-convert-in"
      OFFICE_CONVERT_S3_OUTPUT_BUCKETS_ALLOWLIST: "office-convert-out"
      OFFICE_CONVERT_S3_DEFAULT_OUTPUT_BUCKET: "office-convert-out"
      AWS_ENDPOINT_URL_S3: "http://localstack:4566"
      OFFICE_CONVERT_S3_PUBLIC_ENDPOINT: "http://localhost:4567"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      # HTML dual-engine feature: Chromium engine URL (Gotenberg).
      OFFICE_CONVERT_GOTENBERG_URL: "http://gotenberg:3000"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/cache/fontconfig
    # Go binary probes its own /health endpoint directly.
    healthcheck:
      test: ["CMD", "/usr/local/bin/office-convert-orchestrator", "healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 6g
    mem_swappiness: 60
    depends_on:
      localstack:
        condition: service_healthy
      gotenberg:
        condition: service_started

  # ============================================================
  # Gotenberg — Chromium-based HTML→PDF engine.
  # POST /v1/convert/html/gotenberg routes here.
  # Internal-only (no host port); reached as http://gotenberg:3000.
  # ============================================================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: office-convert-gotenberg
    restart: unless-stopped
    # BR-4 deny policy. The regex matches the ChromiumDenyListRegex constant
    # in internal/netpolicy/netpolicy.go — keep the two literally in sync.
    command:
      - "gotenberg"
      - "--chromium-deny-list=^https?://(?:[^@/]*@)?(?:localhost|[^/:.]+|[^/:]*\\.localhost|127\\.[0-9.]+|0\\.0\\.0\\.0|10\\.[0-9.]+|192\\.168\\.[0-9.]+|172\\.(?:1[6-9]|2[0-9]|3[01])\\.[0-9.]+|169\\.254\\.[0-9.]+|\\[::1\\]|\\[[fF][cdCD][0-9a-fA-F]{2}:[^\\]]*\\]|\\[[fF][eE][89abAB][0-9a-fA-F]:[^\\]]*\\])(?::[0-9]+)?(?:[/?#]|$)"
      # Above the orchestrator's 120s client timeout so the client decides
      # when a conversion is dead (clean error mapping).
      - "--api-timeout=130s"
      - "--chromium-max-queue-size=10"
    mem_limit: 768m
    security_opt:
      - no-new-privileges:true

  # ============================================================
  # Next.js UI — operator dashboard.
  # Open: http://localhost:8501
  # API calls are proxied server-side via /api/* rewrites (BR-UI-1).
  # ============================================================
  ui:
    container_name: office-convert-ui
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: office-convert-ui:dev
    ports:
      - "127.0.0.1:8501:3000"
    environment:
      API_URL: "http://office-convert:8080"
      NEXT_PUBLIC_DASHBOARD_URL: "http://localhost:8080/v1/dashboard"
      NEXT_PUBLIC_S3_ENABLED: "${OFFICE_CONVERT_S3_ENABLED:-true}"
      PORT: "3000"
    depends_on:
      - office-convert
    restart: unless-stopped

  # ============================================================
  # LocalStack — local AWS S3 emulation.
  # ============================================================
  localstack:
    container_name: office-convert-localstack
    image: localstack/localstack:3.8
    ports:
      # Host port 4567 (not 4566) to coexist with sibling project localstack.
      - "127.0.0.1:4567:4566"
    environment:
      SERVICES: "s3"
      DEBUG: "0"
      PERSISTENCE: "0"
    volumes:
      - ./deploy/localstack/init-buckets.sh:/etc/localstack/init/ready.d/init-buckets.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

# ============================================================
# Named volumes
# ============================================================
volumes:
  office-convert-cache:
    driver: local
