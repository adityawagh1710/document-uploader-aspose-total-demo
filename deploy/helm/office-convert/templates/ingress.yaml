{{- if .Values.ingress.enabled -}}
{{/*
Two Ingress resources sharing one ALB via `group.name`. AWS Load Balancer
Controller merges them into a single ALB; the ALB inspects Host header and
routes each subdomain to its Service. Each rule carries two paths: the first
(ssl-redirect / use-annotation) wires the HTTP→HTTPS redirect on port 80,
the second points the HTTPS listener at the real backend.

Pattern mirrored from argocd's argocd-http-ingress (the cluster's proven
internet-facing ALB precedent). Differences from argocd's setup:
  - We use the fresh wildcard cert (fab42f33), not argocd's expired one (213a9222).
  - We add `group.name` so UI + API share one ALB.
  - We set `idle_timeout=300` so Streamlit's persistent websocket doesn't hang.
  - We override healthcheck-path per Ingress (UI vs API endpoints differ).
*/}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "office-convert.uiFullname" . }}
  labels:
    {{- include "office-convert.uiLabels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: {{ .Values.ingress.sslPolicy }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.ingress.inboundCidrs | quote }}
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type":"redirect","RedirectConfig":{"Protocol":"HTTPS","Port":"443","StatusCode":"HTTP_301"}}'
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName }}
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds={{ .Values.ingress.idleTimeoutSeconds }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.uiHealthcheckPath }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.uiHost }}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "office-convert.uiFullname" . }}
                port:
                  number: {{ .Values.ui.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "office-convert.fullname" . }}
  labels:
    {{- include "office-convert.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: {{ .Values.ingress.sslPolicy }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.ingress.inboundCidrs | quote }}
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type":"redirect","RedirectConfig":{"Protocol":"HTTPS","Port":"443","StatusCode":"HTTP_301"}}'
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName }}
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds={{ .Values.ingress.idleTimeoutSeconds }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.apiHealthcheckPath }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "office-convert.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
