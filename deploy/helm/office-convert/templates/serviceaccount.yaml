{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "office-convert.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "office-convert.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.roleArn }}
  annotations:
    # IRSA: binds the API pod to an IAM role for S3 access. Empty by default
    # (S3 disabled), so a plain deploy gets a SA with no AWS permissions.
    # Set serviceAccount.roleArn to the role ARN created from
    # deploy/iam/office-convert-s3-{policy,trust-policy}.json to enable S3.
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
{{- end }}
