{{- if .Values.ui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "office-convert.uiFullname" . }}
  labels:
    {{- include "office-convert.uiLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "office-convert.uiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "office-convert.uiSelectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.ui.podSecurityContext | nindent 8 }}
      containers:
        - name: office-convert-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.ui.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          env:
            # UI → API path: in-cluster service DNS. Same target regardless of
            # how the UI itself is reached (port-forward or NLB), so a user
            # browsing localhost:8501 hits exactly the same API as a user
            # browsing the (eventual) UI NLB.
            - name: API_URL
              value: "http://{{ include "office-convert.fullname" . }}:{{ .Values.service.port }}"
            # Browser-facing API URL — used for iframes the operator's
            # browser loads directly (e.g. /v1/dashboard embedded panel).
            # The browser can't resolve the in-cluster service DNS in
            # API_URL above, so PUBLIC_API_URL must be the external ALB
            # hostname of the API Ingress. Configure in values.yaml as
            # `ui.publicApiUrl`. Defaults to API_URL (single-origin local
            # dev); set explicitly for any deployment where API and UI
            # live on different hostnames.
            - name: PUBLIC_API_URL
              value: {{ .Values.ui.publicApiUrl | default (printf "http://%s:%v" (include "office-convert.fullname" .) .Values.service.port) | quote }}
            - name: STREAMLIT_SERVER_HEADLESS
              value: "true"
            # XSRF off: port-forward changes the origin and Streamlit's default
            # XSRF check rejects file uploads otherwise. UI is internal-only
            # (ClusterIP) and has no auth in v1, so this adds no real security.
            - name: STREAMLIT_SERVER_ENABLE_CORS
              value: {{ .Values.ui.streamlit.enableCORS | quote }}
            - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
              value: {{ .Values.ui.streamlit.enableXsrfProtection | quote }}
            # Streamlit's default upload cap is 200 MB; raised to match the
            # API's max_input_bytes so the UI doesn't reject before the
            # API ceiling kicks in.
            - name: STREAMLIT_SERVER_MAX_UPLOAD_SIZE
              value: {{ .Values.ui.streamlit.maxUploadSizeMb | quote }}
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
          readinessProbe:
            httpGet:
              # Streamlit's built-in health endpoint. Returns "ok" once the
              # server is accepting requests.
              path: /_stcore/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
