target-version = "py311"
line-length = 100

[lint]
select = ["E", "F", "I", "B", "UP", "RUF", "SIM", "PIE", "PL"]
ignore = ["PLR0913"]  # allow many args (FastAPI handlers)

[lint.per-file-ignores]
"tests/**" = ["PLR2004", "S101"]  # magic values + asserts ok in tests
"tests/corpus/_generate.py" = ["E501"]
"tests/unit/test_probe.py" = ["E501"]  # full MIME content-type strings as test fixtures
"tests/e2e/test_real_conversion.py" = ["E501"]  # long URL fixtures
"office_convert/csv_input.py" = ["E501"]  # OOXML content-type + relationship URLs in XML constants
# server.py has FastAPI handlers that naturally hit 50+ statements and many
# branches (multipart parse + format detect + buffer + license + rate-limit
# + cache + orchestrate + stream). Refactoring into smaller pieces would
# obscure the request lifecycle. E501 ignored for the embedded landing-page
# HTML/CSS string literal — intentional single-line CSS rules read better
# than artificial wraps (same pattern as csv_input.py above).
"office_convert/server.py" = ["PLR0915", "PLR0912", "E501"]
# app.py is the Streamlit dashboard: dense inline HTML/CSS (E501), live
# threshold constants like 70/90 % CPU (PLR2004 — naming each is overkill
# for a single-file UI), long fragment + render functions (PLR0915/PLR0912),
# intentional Unicode glyphs (×, ›, ℹ — RUF001/RUF003) in status text, and
# the occasional nested-if (SIM102) when it reads clearer than a flat AND.
"office_convert_ui/app.py" = ["E501", "PLR2004", "PLR0915", "PLR0912", "RUF001", "RUF003", "SIM102"]

[format]
quote-style = "double"
