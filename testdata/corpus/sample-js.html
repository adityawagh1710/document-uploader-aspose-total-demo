<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>JS sample — office-convert HTML corpus</title>
  <style>
    body { font-family: Helvetica, Arial, sans-serif; margin: 2rem; }
    #static { color: #1a4d8f; }
    #dynamic { color: #b03030; font-weight: bold; }
    .placeholder { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <h1 id="static">JavaScript fidelity sample</h1>
  <p>The heading above is static. Everything inside the box below is produced
     by JavaScript after load — it demonstrates the engine fault line:</p>
  <div id="dynamic"><span class="placeholder">JavaScript did NOT run — this
     placeholder means the engine rendered the static DOM only (expected for
     Aspose.Words).</span></div>
  <script>
    // Simulates an SPA-style async render. Use with the Gotenberg endpoint's
    // waitForExpression=window.status === 'ready' to capture the final state.
    window.status = "loading";
    setTimeout(function () {
      var rows = ["alpha", "beta", "gamma", "delta"].map(function (n, i) {
        return "<tr><td>" + (i + 1) + "</td><td>" + n + "</td><td>" +
               (Math.round(((i + 1) * 1234.5)) / 100) + "</td></tr>";
      }).join("");
      document.getElementById("dynamic").innerHTML =
        "<p>JavaScript RAN — dynamic table below (expected for Gotenberg):</p>" +
        "<table border='1' cellpadding='6'><tr><th>#</th><th>name</th><th>value</th></tr>" +
        rows + "</table>";
      window.status = "ready";
    }, 300);
  </script>
</body>
</html>
