version: 2

# Weekly PRs to keep deps + base images + GitHub Actions current. Pairs
# with the Trivy job in .github/workflows/security.yml — Trivy detects
# CVEs, dependabot opens the PR to fix them.
#
# Grouping rationale: groups collapse related minor/patch bumps into
# single PRs so weekly cadence stays manageable. Majors stay individual
# (a major bump deserves a focused review).
updates:
  # Next.js UI dependencies declared in ui/package.json.
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      # Next.js + React runtime stack. Bumping these together avoids the
      # version-skew breakage class where next/react/react-dom must move
      # in lockstep.
      nextjs-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
          - "@types/react"
          - "@types/react-dom"
          - "swr"
          - "recharts"
        update-types:
          - "minor"
          - "patch"
      # Test + lint + build tooling. None of these affect runtime
      # behavior, safe to roll together.
      test-tooling:
        patterns:
          - "vitest"
          - "@vitejs/*"
          - "@testing-library/*"
          - "jsdom"
          - "typescript"
          - "@types/node"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
        update-types:
          - "minor"
          - "patch"

  # Base images in the Dockerfiles. Picks up golang:1.26-bookworm,
  # node:22-alpine, gotenberg/gotenberg, localstack/localstack, etc.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      # All base-image bumps in one PR.
      base-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Don't auto-bump majors — major base-image bumps (Go toolchain,
    # Node runtime) need manual review + local build verification.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used in workflows (actions/checkout, docker/build-push,
  # aquasecurity/trivy-action, github/codeql-action, azure/setup-helm).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      # Small surface; group all actions in one PR. Includes major
      # bumps because the Node.js runtime deprecation deadlines (e.g.
      # Node 20 → 24 by 2026-06-02) require occasional major upgrades.
      all-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"
