name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  qa:
    name: lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image (Dockerfile.test, GHA cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          tags: office-convert-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ruff check
        run: docker run --rm office-convert-test:ci ruff check .

      - name: ruff format --check
        run: docker run --rm office-convert-test:ci ruff format --check .

      - name: mypy --strict
        run: docker run --rm office-convert-test:ci mypy office_convert

      - name: pytest (unit + property + integration, parallel)
        run: docker run --rm office-convert-test:ci pytest -n auto tests/unit tests/property tests/integration -v

  go-test:
    name: go build + vet + test (incl. golden parity gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go build + vet
        run: |
          go build ./...
          go vet ./...

      # `go test ./...` runs the unit + property suites AND TestGoldenParity (the
      # Go<->Python wire-contract gate) — its fixtures are committed under
      # internal/server/testdata/golden/, so no Python/qpdf is needed in CI.
      # The fixtures are (re)generated locally via `make golden-capture`.
      - name: go test (unit + property + golden parity gate)
        run: go test ./...

  helm-lint:
    name: helm chart lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: helm lint
        run: helm lint deploy/helm/office-convert

      - name: helm template (render check)
        run: helm template office-convert deploy/helm/office-convert > /dev/null
