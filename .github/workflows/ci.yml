name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  qa:
    name: lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image (Dockerfile.test, GHA cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          tags: office-convert-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ruff check
        run: docker run --rm office-convert-test:ci ruff check .

      - name: ruff format --check
        run: docker run --rm office-convert-test:ci ruff format --check .

      - name: mypy --strict
        run: docker run --rm office-convert-test:ci mypy office_convert

      - name: pytest (unit + property + integration, parallel)
        run: docker run --rm office-convert-test:ci pytest -n auto tests/unit tests/property tests/integration -v

  helm-lint:
    name: helm chart lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: helm lint
        run: helm lint deploy/helm/office-convert

      - name: helm template (render check)
        run: helm template office-convert deploy/helm/office-convert > /dev/null
