name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-test:
    name: go build + vet + test (incl. golden parity gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go build + vet
        run: |
          go build ./...
          go vet ./...

      # `go test ./...` runs the unit + property suites AND TestGoldenParity (the
      # golden fixture parity gate). Fixtures are committed under
      # internal/server/testdata/golden/ — no Aspose/qpdf needed in CI.
      - name: go test (unit + property + golden parity gate)
        run: go test ./...

  ui-test:
    name: Next.js lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm --prefix ui ci

      - name: ESLint
        run: npm --prefix ui run lint

      - name: TypeScript type check
        run: npm --prefix ui run typecheck

      - name: Production build
        run: npm --prefix ui run build

  helm-lint:
    name: helm chart lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: helm lint
        run: helm lint deploy/helm/office-convert

      - name: helm template (render check)
        run: helm template office-convert deploy/helm/office-convert > /dev/null
