name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 07:00 UTC — picks up newly-disclosed CVEs against
    # pinned deps that didn't change since last PR.
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write  # upload SARIF to GitHub code scanning
  packages: read          # authenticated pull of the Trivy DB from ghcr.io (rate-limit fix)

jobs:
  trivy-fs:
    name: trivy filesystem (deps + iac)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # Authenticate the Trivy vulnerability-DB pull from ghcr.io. Without this,
      # the DB is fetched anonymously and shared GitHub-runner IPs routinely hit
      # the GHCR rate limit (TOOMANYREQUESTS) → the scan fast-fails with exit 1.
      # The built-in GITHUB_TOKEN gives a per-token rate limit. (Aqua's
      # documented fix for trivy-action rate limiting.)
      - name: Log in to ghcr.io (for the Trivy DB)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Filesystem scan: Go modules (go.mod) + the Next.js UI deps
      # (ui/package-lock.json). ignore-unfixed=true matches our policy (we
      # already patch what the base images ship; unfixed CVEs are tracked
      # manually — see reference_image_security_scanning.md).
      - name: Trivy filesystem (vuln)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-fs.sarif
          # Skip dirs not worth scanning. corpus + .ruff_cache are bulky
          # and have no security-relevant content.
          skip-dirs: corpus,.ruff_cache,.pytest_cache,.mypy_cache,.venv

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # Config scan: Dockerfiles + Helm chart + k8s manifests. Surfaces
      # misconfigurations (root user, missing healthchecks, broad caps).
      # exit-code=0 — informational only, don't block PRs on style nits.
      - name: Trivy config (Dockerfile + Helm + k8s)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: sarif
          output: trivy-config.sarif
          skip-dirs: corpus,.ruff_cache,.pytest_cache,.mypy_cache,.venv

      - name: Upload Trivy config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
